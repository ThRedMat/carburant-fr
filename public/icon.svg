<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1612"/>
      <stop offset="100%" stop-color="#0D0B09"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F07840"/>
      <stop offset="100%" stop-color="#C84010"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#C09020"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#F07840" stroke-width="1.5" opacity="0.18"/>

  <!-- Fuel pump body -->
  <rect x="148" y="170" width="148" height="210" rx="16" fill="url(#accent)" opacity="0.95"/>

  <!-- Pump top -->
  <rect x="148" y="150" width="148" height="36" rx="10" fill="#E06030"/>

  <!-- Screen on pump -->
  <rect x="166" y="196" width="112" height="56" rx="8" fill="#0D0B09" opacity="0.7"/>
  <text x="222" y="235" text-anchor="middle" font-family="'DM Mono', monospace, sans-serif"
        font-size="26" font-weight="700" fill="url(#gold)" letter-spacing="-1">1.849</text>
  <text x="222" y="252" text-anchor="middle" font-family="sans-serif"
        font-size="10" fill="#A08060" letter-spacing="1">€ / L</text>

  <!-- Pump door / lower body -->
  <rect x="164" y="264" width="116" height="100" rx="8" fill="#C05020" opacity="0.5"/>

  <!-- Hose arm -->
  <rect x="296" y="160" width="16" height="80" rx="8" fill="#D07040"/>
  <!-- Hose curve -->
  <path d="M304 240 Q340 240 340 270 L340 310" fill="none" stroke="#D07040" stroke-width="14" stroke-linecap="round"/>
  <!-- Nozzle -->
  <rect x="330" y="308" width="28" height="46" rx="6" fill="url(#gold)"/>
  <rect x="326" y="318" width="36" height="14" rx="4" fill="#C09020"/>

  <!-- Base -->
  <rect x="128" y="378" width="188" height="18" rx="9" fill="#C84010" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="176" cy="348" r="5" fill="#F0C040" opacity="0.5"/>
  <circle cx="222" cy="348" r="5" fill="#F0C040" opacity="0.5"/>
  <circle cx="268" cy="348" r="5" fill="#F0C040" opacity="0.5"/>
</svg>